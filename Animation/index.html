<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        body{
            background-color: rgb(244, 6, 6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tran{
            background-color: antiquewhite;
            height: 100px;
            width: 100px;
            z-index: 1;
            transition:width 2s, height 4s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(59, 26, 204);
        }

        .tran:hover{
            width: 500px;
            color: rgb(210, 233, 126);
            height: 200px;
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="tran">transition 1</div>
</body>
</html>
